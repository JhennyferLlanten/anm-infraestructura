server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://anm-loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: anm-web-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: anm-web
          container: anm-web
          __path__: /app/logs/*.log
